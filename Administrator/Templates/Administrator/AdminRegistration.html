<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration</title>
</head>

<body>
        <h1 align="center">Admin Registration</h1>
    <form action="" method="post">
        {% csrf_token %}
        <table border="1" align="center">
            <tr>
                <td>Name</td>
                <td><input type="text" name="txt_name" id=""></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email" name="txt_email" id=""></td>
            </tr>
            <tr>
                <td>Contact</td>
                <td><input type="text" name="txt_contact" id=""></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" name="txt_password" id=""></td>
            </tr>
            <tr>

                <td colspan="2" align="center"><input type="submit" value="Register"></td>
            </tr>
        </table>



        <br>

        <table border="1" cellpadding="10" align="center">
            <tr>
                <td>SNO</td>
                <td>Admin Name</td>
                <td>Admin Email</td>
                <td>Admin Contact</td>
                <td>Admin Password</td>
                <td>Action</td>
            </tr>
            {% for i in admindata %}
            <tr>
                <td>{{forloop.counter}}</td>
                <td>{{i.admin_name}}</td>
                <td>{{i.admin_email}}</td>
                <td>{{i.admin_contact}}</td>
                <td>{{i.admin_password}}</td>
                <td></td>
            </tr>
            {% endfor %}
        </table>
    </form>
</body>

</html>
